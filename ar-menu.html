<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Menu</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
<style>
  :root{
    --ink:#1c1410;
    --char:#2a1e17;
    --brass:#c8a44d;
    --brass-soft:#e6cd8a;
    --ivory:#f3ead9;
    --line:rgba(200,164,77,0.25);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--ink);
    color:var(--ivory);
    font-family:'Segoe UI', system-ui, sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  header{
    padding:48px 20px 28px;
    text-align:center;
    border-bottom:1px solid var(--line);
  }
  .eyebrow{
    letter-spacing:.28em;
    font-size:11px;
    text-transform:uppercase;
    color:var(--brass);
    margin-bottom:10px;
  }
  h1{
    font-family:Georgia, 'Times New Roman', serif;
    font-weight:600;
    font-size:clamp(28px,6vw,42px);
    margin:0 0 8px;
    letter-spacing:.01em;
  }
  header p{
    margin:0;
    color:#c7b9a4;
    font-size:14px;
  }
  main{
    max-width:640px;
    margin:0 auto;
    padding:28px 16px 60px;
    display:flex;
    flex-direction:column;
    gap:22px;
  }
  .dish{
    background:linear-gradient(180deg, var(--char), #221812);
    border:1px solid var(--line);
    border-radius:18px;
    overflow:hidden;
  }
  .dish-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    padding:20px 20px 14px;
    gap:12px;
  }
  .dish-name{
    font-family:Georgia, serif;
    font-size:20px;
    margin:0 0 4px;
  }
  .dish-desc{
    margin:0;
    font-size:13.5px;
    color:#b8a98e;
    line-height:1.5;
  }
  .dish-price{
    font-size:16px;
    color:var(--brass-soft);
    white-space:nowrap;
    font-variant-numeric:tabular-nums;
  }
  model-viewer{
    width:100%;
    height:260px;
    background:#161009;
    --poster-color:transparent;
  }
  .ar-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 20px;
    border-top:1px solid var(--line);
  }
  .missing{
    font-size:12px;
    color:#8a7a63;
  }
  button[slot="ar-button"]{
    background:var(--brass);
    color:#1c1410;
    border:none;
    border-radius:999px;
    padding:9px 18px;
    font-size:13px;
    font-weight:600;
    letter-spacing:.02em;
    cursor:pointer;
  }
  button[slot="ar-button"]:active{ transform:scale(.97); }
  .hint{
    font-size:11px;
    color:#7f7060;
  }
  footer{
    text-align:center;
    padding:20px;
    font-size:11px;
    color:#7f7060;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Table Preview</div>
  <h1>AR Menu</h1>
  <p>Dish ke photo ki jagah, apni table par 3D mein dekhiye</p>
</header>

<main id="menu"></main>

<footer>Model tap karke ghumaayein &middot; "View in your space" se AR khulega</footer>

<script>
// ------------------------------------------------------------------
// glb  -> Android (Chrome Scene Viewer) + WebXR ke liye, ready hai.
// usdz -> abhi provide nahi kiya gaya, isliye iPhone (Quick Look) AR
//         kaam nahi karega jab tak .usdz file na di jaaye.
//         Price khaali chhoda hai — apna price daal dein.
// ------------------------------------------------------------------
const dishes = [
  {
    name: "Chocolate Cake",
    desc: "Rich chocolate layered cake.",
    price: "₹500",
    glb: "models/chocolate-cake.glb",
    usdz: ""
  },
  {
    name: "Grilled Sandwich",
    desc: "Toasted sandwich, grilled to perfection.",
    price: "₹70",
    glb: "models/grilled-sandwich.glb",
    usdz: ""
  },
  {
    name: "Momos",
    desc: "Steamed dumplings served with chutney.",
    price: "₹100",
    glb: "models/momos.glb",
    usdz: ""
  },
  {
    name: "Zinger Burger",
    desc: "Crispy fried chicken burger, spiced and stacked.",
    price: "₹50",
    glb: "models/zinger-burger.glb",
    usdz: ""
  },
  {
    name: "Pastry",
    desc: "Freshly baked pastry.",
    price: "₹50",
    glb: "models/pastry.glb",
    usdz: ""
  }
];

const menu = document.getElementById('menu');

dishes.forEach((d, i) => {
  const card = document.createElement('div');
  card.className = 'dish';
  card.innerHTML = `
    <div class="dish-head">
      <div>
        <p class="dish-name">${d.name}</p>
        <p class="dish-desc">${d.desc}</p>
      </div>
      <div class="dish-price">${d.price}</div>
    </div>
    <model-viewer
      src="${d.glb}"
      ${d.usdz ? `ios-src="${d.usdz}"` : ''}
      alt="3D model of ${d.name}"
      ar
      ar-modes="${d.usdz ? 'webxr scene-viewer quick-look' : 'webxr scene-viewer'}"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      exposure="1"
      loading="lazy"
      reveal="auto">
      <button slot="ar-button">
        View in your space
      </button>
    </model-viewer>
    <div class="ar-bar">
      <span class="hint">Model ${i + 1} of ${dishes.length}</span>
      <span class="missing">${d.usdz ? 'Android + iPhone AR ready' : 'Android AR ready · iPhone needs .usdz'}</span>
    </div>
  `;
  menu.appendChild(card);
});
</script>

</body>
</html>
