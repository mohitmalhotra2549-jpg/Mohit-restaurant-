<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu · AR</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
<style>
  :root{
    --bg:#0c0b0a;
    --surface:#161412;
    --surface-2:#1d1a17;
    --gold:#c9a24d;
    --gold-soft:#e6cd8f;
    --ivory:#f2ead9;
    --muted:#8f8578;
    --line:rgba(201,162,77,0.18);
    --radius:4px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 50% 0%, #1a1712 0%, #0c0b0a 55%);
    color:var(--ivory);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  header{
    padding:52px 24px 30px;
    text-align:center;
  }
  .kicker{
    font-size:10.5px;
    letter-spacing:.32em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:14px;
  }
  header h1{
    font-family:Georgia,'Times New Roman',serif;
    font-weight:400;
    font-size:clamp(30px,7vw,40px);
    letter-spacing:.02em;
    margin:0 0 10px;
    color:var(--ivory);
  }
  .rule{
    width:56px;
    height:1px;
    background:var(--gold);
    margin:0 auto 14px;
    opacity:.7;
  }
  header p{
    margin:0;
    font-size:12.5px;
    color:var(--muted);
    letter-spacing:.03em;
  }

  main{
    max-width:540px;
    margin:0 auto;
    padding:8px 18px 60px;
    display:flex;
    flex-direction:column;
    gap:22px;
  }

  .card{
    background:linear-gradient(180deg, var(--surface), var(--surface-2));
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    position:relative;
  }
  .card::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:var(--radius);
    padding:1px;
    pointer-events:none;
    background:linear-gradient(160deg, rgba(201,162,77,0.35), transparent 40%);
    -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
  }

  .model-wrap{
    position:relative;
    width:100%;
    height:250px;
    background:radial-gradient(circle at 50% 35%, #221e18 0%, #14120f 75%);
    border-bottom:1px solid var(--line);
  }
  model-viewer{
    width:100%;
    height:100%;
    --poster-color:transparent;
  }

  .index{
    position:absolute;
    left:16px;
    top:16px;
    z-index:2;
    font-family:Georgia, serif;
    font-size:11px;
    letter-spacing:.1em;
    color:var(--gold-soft);
    border:1px solid var(--line);
    padding:5px 10px;
    border-radius:2px;
    background:rgba(12,11,10,0.55);
    backdrop-filter:blur(6px);
  }

  .ar-pill{
    position:absolute;
    right:14px;
    bottom:14px;
    z-index:2;
    display:flex;
    align-items:center;
    gap:7px;
    background:var(--gold);
    color:#161412;
    border:none;
    padding:10px 16px 10px 13px;
    border-radius:2px;
    font-size:12px;
    font-weight:700;
    letter-spacing:.04em;
    text-transform:uppercase;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(0,0,0,0.4);
  }
  .ar-pill svg{width:14px;height:14px;flex-shrink:0;}

  .card-body{
    padding:20px 22px 24px;
  }
  .name-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:14px;
    margin-bottom:8px;
  }
  .name{
    font-family:Georgia,'Times New Roman',serif;
    font-size:19px;
    font-weight:400;
    letter-spacing:.01em;
    color:var(--ivory);
  }
  .price{
    flex-shrink:0;
    font-family:Georgia, serif;
    font-size:16px;
    color:var(--gold-soft);
    white-space:nowrap;
  }
  .desc{
    margin:0;
    font-size:12.5px;
    color:var(--muted);
    line-height:1.6;
    letter-spacing:.01em;
  }

  footer{
    text-align:center;
    padding:10px 20px 34px;
    font-size:11px;
    color:var(--muted);
    letter-spacing:.03em;
  }
</style>
</head>
<body>

<header>
  <div class="kicker">Table Preview</div>
  <h1>The Menu</h1>
  <div class="rule"></div>
  <p>Model ghumaayein &middot; AR mein apni jagah dekhein</p>
</header>

<main id="menu"></main>

<footer>Android par turant AR khulega &middot; iPhone AR abhi supported nahi</footer>

<script>
const dishes = [
  {
    name: "Chocolate Cake",
    desc: "Rich chocolate layered cake.",
    price: "₹500",
    glb: "models/chocolate-cake.glb",
    usdz: ""
  },
  {
    name: "Grilled Sandwich",
    desc: "Toasted sandwich, grilled to perfection.",
    price: "₹70",
    glb: "models/grilled-sandwich.glb",
    usdz: ""
  },
  {
    name: "Momos",
    desc: "Steamed dumplings served with chutney.",
    price: "₹100",
    glb: "models/momos.glb",
    usdz: ""
  },
  {
    name: "Zinger Burger",
    desc: "Crispy fried chicken burger, spiced and stacked.",
    price: "₹50",
    glb: "models/zinger-burger.glb",
    usdz: ""
  },
  {
    name: "Pastry",
    desc: "Freshly baked pastry.",
    price: "₹50",
    glb: "models/pastry.glb",
    usdz: ""
  }
];

const arIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 3 7v10l9 5 9-5V7z"/><path d="M3 7l9 5 9-5"/><path d="M12 12v10"/></svg>`;

const menu = document.getElementById('menu');

dishes.forEach((d, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="model-wrap">
      <span class="index">${String(i + 1).padStart(2, '0')}</span>
      <model-viewer
        src="${d.glb}"
        ${d.usdz ? `ios-src="${d.usdz}"` : ''}
        alt="3D model of ${d.name}"
        ar
        ar-modes="${d.usdz ? 'webxr scene-viewer quick-look' : 'webxr scene-viewer'}"
        camera-controls
        auto-rotate
        shadow-intensity="0.9"
        exposure="0.95"
        loading="lazy"
        reveal="auto">
        <button slot="ar-button" class="ar-pill">${arIcon}View in AR</button>
      </model-viewer>
    </div>
    <div class="card-body">
      <div class="name-row">
        <span class="name">${d.name}</span>
        <span class="price">${d.price}</span>
      </div>
      <p class="desc">${d.desc}</p>
    </div>
  `;
  menu.appendChild(card);
});
</script>

</body>
</html>
