<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu · AR</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
<style>
  :root{
    --bg:#fafaf9;
    --surface:#ffffff;
    --ink:#131313;
    --muted:#8a8a86;
    --line:#ececea;
    --accent:#0f9d6e;
    --accent-ink:#ffffff;
    --radius:20px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  header{
    position:sticky;
    top:0;
    z-index:10;
    background:rgba(250,250,249,0.85);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    padding:20px 20px 14px;
    border-bottom:1px solid var(--line);
  }
  header h1{
    margin:0;
    font-size:22px;
    font-weight:700;
    letter-spacing:-0.01em;
  }
  header p{
    margin:4px 0 0;
    font-size:13px;
    color:var(--muted);
  }

  main{
    max-width:520px;
    margin:0 auto;
    padding:18px 16px 48px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }

  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
  }

  .model-wrap{
    position:relative;
    width:100%;
    height:230px;
    background:
      radial-gradient(circle at 30% 20%, #f2f2f0 0%, #eaeae8 60%, #e3e3e0 100%);
  }
  model-viewer{
    width:100%;
    height:100%;
    --poster-color:transparent;
  }

  .ar-pill{
    position:absolute;
    right:12px;
    bottom:12px;
    z-index:2;
    display:flex;
    align-items:center;
    gap:6px;
    background:var(--ink);
    color:#fff;
    border:none;
    padding:9px 14px 9px 12px;
    border-radius:999px;
    font-size:12.5px;
    font-weight:600;
    cursor:pointer;
    box-shadow:0 6px 16px rgba(0,0,0,0.18);
  }
  .ar-pill svg{width:15px;height:15px;flex-shrink:0;}

  .card-body{
    padding:16px 18px 18px;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
  }
  .name{
    margin:0 0 4px;
    font-size:16.5px;
    font-weight:700;
    letter-spacing:-0.005em;
  }
  .desc{
    margin:0;
    font-size:13px;
    color:var(--muted);
    line-height:1.45;
  }
  .price{
    flex-shrink:0;
    background:#eef8f3;
    color:var(--accent);
    font-weight:700;
    font-size:13.5px;
    padding:7px 12px;
    border-radius:999px;
    white-space:nowrap;
  }

  .rotate-tag{
    position:absolute;
    left:12px;
    top:12px;
    z-index:2;
    background:rgba(255,255,255,0.85);
    backdrop-filter:blur(4px);
    color:var(--muted);
    font-size:11px;
    font-weight:600;
    padding:6px 10px;
    border-radius:999px;
  }

  footer{
    text-align:center;
    padding:8px 20px 28px;
    font-size:11.5px;
    color:var(--muted);
  }
</style>
</head>
<body>

<header>
  <h1>Menu</h1>
  <p>Model ghumaayein &middot; tap karke apni jagah AR mein dekhein</p>
</header>

<main id="menu"></main>

<footer>Android par turant AR khulega &middot; iPhone AR abhi supported nahi</footer>

<script>
// ------------------------------------------------------------------
// Dish data — naam, description, price aur model file path
// ------------------------------------------------------------------
const dishes = [
  {
    name: "Chocolate Cake",
    desc: "Rich chocolate layered cake.",
    price: "₹500",
    glb: "models/chocolate-cake.glb",
    usdz: ""
  },
  {
    name: "Grilled Sandwich",
    desc: "Toasted sandwich, grilled to perfection.",
    price: "₹70",
    glb: "models/grilled-sandwich.glb",
    usdz: ""
  },
  {
    name: "Momos",
    desc: "Steamed dumplings served with chutney.",
    price: "₹100",
    glb: "models/momos.glb",
    usdz: ""
  },
  {
    name: "Zinger Burger",
    desc: "Crispy fried chicken burger, spiced and stacked.",
    price: "₹50",
    glb: "models/zinger-burger.glb",
    usdz: ""
  },
  {
    name: "Pastry",
    desc: "Freshly baked pastry.",
    price: "₹50",
    glb: "models/pastry.glb",
    usdz: ""
  }
];

const arIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 3 7v10l9 5 9-5V7z"/><path d="M3 7l9 5 9-5"/><path d="M12 12v10"/></svg>`;

const menu = document.getElementById('menu');

dishes.forEach((d) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="model-wrap">
      <span class="rotate-tag">3D</span>
      <model-viewer
        src="${d.glb}"
        ${d.usdz ? `ios-src="${d.usdz}"` : ''}
        alt="3D model of ${d.name}"
        ar
        ar-modes="${d.usdz ? 'webxr scene-viewer quick-look' : 'webxr scene-viewer'}"
        camera-controls
        auto-rotate
        disable-zoom
        shadow-intensity="0.7"
        exposure="1"
        loading="lazy"
        reveal="auto">
        <button slot="ar-button" class="ar-pill">${arIcon}View in AR</button>
      </model-viewer>
    </div>
    <div class="card-body">
      <div>
        <p class="name">${d.name}</p>
        <p class="desc">${d.desc}</p>
      </div>
      <div class="price">${d.price}</div>
    </div>
  `;
  menu.appendChild(card);
});
</script>

</body>
</html>
